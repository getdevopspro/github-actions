name: Promote

on:
  workflow_call:
    secrets:
      registry-password:
        description: 'Password or token for registry login'
        required: false
      checkout-token:
        description: 'Checkout token with repo permissions'
        required: false
    outputs:
      version:
        description: 'Detected or calculated version'
        value: ${{ jobs.promote.outputs.version }}
      commit-sha:
        description: 'The commit SHA being built'
        value: ${{ jobs.promote.outputs.version }}
      changelog:
        description: 'The changelog for the released version'
        value: ${{ jobs.promote.outputs.changelog }}
    inputs:
      git-user-name:
        description: 'The git user name'
        required: false
        type: string
        default: 'github-actions[bot]'
      git-user-email:
        description: 'The git user email'
        required: false
        type: string
        default: '41898282+github-actions[bot]@users.noreply.github.com'
      git-add-files:
        description: 'The files to add to git'
        required: false
        type: string
      version-previous:
        description: 'The strategy to detect the previous version: auto, from-tag, from-file or manual'
        required: false
        default: 'auto'
        type: string
      version-next:
        description: 'The strategy to calculate the next version: auto, semantic, from-file, increment or manual'
        required: false
        default: 'auto'
        type: string
      version-output-format:
        description: 'The output format of the next version'
        required: false
        default: '{{.Major}}.{{.Minor}}.{{.Patch}}'
        type: string
      version-tag-prefix:
        description: 'The prefix for the new tag - prefixed before the output'
        required: false
        default: 'v'
        type: string
      version-file:
        description: 'Set version in file named as input'
        required: false
        type: string
      version-makefile:
        description: 'Set version in makefile named as input'
        required: false
        type: string
      version-justfile:
        description: 'Set version in justfile named as input'
        required: false
        type: string
      version-package:
        description: 'Set version in package json named as input'
        required: false
        type: string
      version-package-lock:
        description: 'Set version in package lock named as input'
        required: false
        type: string
      version-script:
        description: 'Set version in script named as input'
        required: false
        type: string
      version-chart:
        description: 'Set version in chart named as input'
        required: false
        type: string
      make-target-pre-push:
        description: 'The make target to run'
        required: false
        default: ""
        type: string
      push-git:
        description: 'Push git changes'
        required: false
        default: true
        type: boolean
      fetch-depth:
        description: 'Number of commits to fetch. 0 indicates all history for all branches and tags'
        required: false
        type: number
        default: 0
      fetch-tags:
        description: 'Whether to fetch tags'
        required: false
        type: boolean
        default: true
      submodules:
        description: 'Whether to checkout submodules: true, false, or recursive'
        required: false
        type: boolean
        default: true
      registry:
        description: 'The container registry'
        required: false
        default: 'ghcr.io'
        type: string
      registry-username:
        description: 'The container registry username'
        required: false
        default: ${{ github.actor }}
        type: string
      image-digests:
        description: 'JSON with all merged image manifest digests'
        required: false
        type: string
      image-additional-tags:
        description: 'Additional image tags to apply (comma-separated, e.g. "stable,prod")'
        required: false
        type: string
      changelog-enabled:
        description: 'Generate release changelog'
        required: false
        type: boolean
        default: false
      changelog-token:
        description: 'GitHub token for changelog generation (defaults to current GitHub token)'
        required: false
        type: string
      changelog-output:
        description: 'Output file path for the generated changelog (sets OUTPUT env for git-cliff)'
        required: false
        type: string
        default: 'CHANGELOG.md'
      changelog-config:
        description: 'Path to the cliff.toml config file passed to git-cliff'
        required: false
        type: string
        default: 'cliff'
      changelog-args:
        description: 'Additional arguments to pass to git-cliff'
        required: false
        type: string
      changelog-prepend:
        description: 'Prepend the generated changelog to the output file instead of overwriting it'
        required: false
        type: boolean
        default: true
      release-publish-enable:
        description: 'Create or update a GitHub release after the git push. Requires changelog-enabled to be true.'
        required: false
        type: boolean
        default: false
      release-publish-draft:
        description: 'Mark the GitHub release as draft (release-publish action)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  promote:
    name: Promote
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release_version.outputs.version }}
      commit-sha: ${{ steps.determine_sha.outputs.sha }}
      changelog: ${{ steps.release_changelog.outputs.content }}
    steps:
      - name: validate inputs
        if: inputs.release-publish-enable && !inputs.changelog-enabled
        shell: bash
        run: |
          echo "::error::release-publish-enable requires changelog-enabled to be true"
          exit 1

      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}
          fetch-tags: ${{ inputs.fetch-tags }}
          submodules: ${{ inputs.submodules }}
          token: ${{ secrets.checkout-token || secrets.GITHUB_TOKEN }}

      - name: Determine commit SHA
        id: determine_sha
        shell: bash
        run: |
          if [ -n "${{ github.event.pull_request.head.sha }}" ]; then
            SHA="${{ github.event.pull_request.head.sha }}"
            echo "Using PR HEAD SHA: ${SHA}"
          else
            SHA=$(git rev-parse HEAD)
            echo "Using current HEAD SHA: ${SHA}"
          fi
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - id: release_version
        name: next release version
        uses: getdevopspro/github-actions/release-version@v7.1.0
        with:
          version-previous: ${{ inputs.version-previous }}
          version-next: ${{ inputs.version-next }}
          version-output-format: ${{ inputs.version-output-format }}
          version-tag-prefix: ${{ inputs.version-tag-prefix }}

      - name: set version in file
        uses: getdevopspro/github-actions/version-file@v7.1.0
        with:
          version: ${{ steps.release_version.outputs.version }}
          version-makefile: ${{ inputs.version-makefile }}
          version-justfile: ${{ inputs.version-justfile }}
          version-package: ${{ inputs.version-package }}
          version-package-lock: ${{ inputs.version-package-lock }}
          version-script: ${{ inputs.version-script }}
          version-chart: ${{ inputs.version-chart }}

      - name: promote container images
        if: inputs.image-digests != ''
        uses: getdevopspro/github-actions/buildx-bake/promote@v7.1.0
        with:
          version: ${{ steps.release_version.outputs.version }}
          image-digests: ${{ inputs.image-digests }}
          registry: ${{ inputs.registry }}
          registry-username: ${{ inputs.registry-username }}
          registry-password: ${{ secrets.registry-password || secrets.GITHUB_TOKEN }}
          additional-tags: ${{ inputs.image-additional-tags }}

      - name: run make target before push
        if: inputs.make-target-pre-push != ''
        shell: bash
        run: |
          echo "run make target: ${{ inputs.make-target-pre-push }}"
          make ${{ inputs.make-target-pre-push }}

      - name: release changelog
        id: release_changelog
        if: inputs.changelog-enabled
        uses: orhun/git-cliff-action@v4
        env:
          OUTPUT: ${{ inputs.changelog-prepend && '/tmp/cliff-changelog.md' || inputs.changelog-output || 'CHANGELOG.md' }}
        with:
          config: ${{ inputs.changelog-config }}
          args: >-
            ${{ steps.release_version.outputs.previous-version }}..${{ inputs.changelog-prepend && 'HEAD' || steps.release_version.outputs.version }}
            --tag ${{ steps.release_version.outputs.version }}
            ${{ inputs.changelog-prepend && format('--prepend {0}', inputs.changelog-output || 'CHANGELOG.md') || '' }}
            ${{ inputs.changelog-args }}
          github_token: ${{ inputs.changelog-token || github.token }}

      - name: resolve changelog git-add-files
        id: resolve_changelog_git_add_files
        if: inputs.changelog-enabled
        shell: bash
        run: |
          set -euo pipefail
          CHANGELOG_FILE="${{ inputs.changelog-output }}"
          CHANGELOG_FILE="${CHANGELOG_FILE:-CHANGELOG.md}"
          FILES="${{ inputs.git-add-files }}"
          case " ${FILES} " in
            *" ${CHANGELOG_FILE} "*) ;;
            *) FILES="${FILES:+${FILES} }${CHANGELOG_FILE}" ;;
          esac
          echo "files=${FILES}" >> "$GITHUB_OUTPUT"

      - name: push git version
        uses: getdevopspro/github-actions/release-git-push@v7.1.0
        if: inputs.push-git
        id: git_push
        with:
          version: ${{ steps.release_version.outputs.version }}
          git-user-name: ${{ inputs.git-user-name }}
          git-user-email: ${{ inputs.git-user-email }}
          git-add-files: ${{ steps.resolve_changelog_git_add_files.outputs.files || inputs.git-add-files }}

      - name: publish github release
        if: inputs.release-publish-enable && inputs.push-git
        uses: getdevopspro/github-actions/release-publish@v7.1.0
        with:
          version: ${{ steps.release_version.outputs.version }}
          changelog: ${{ steps.release_changelog.outputs.content }}
          draft: ${{ inputs.release-publish-draft }}
