name: Release Version
description: Set release version
inputs:
  version-previous:
    description: 'The strategy to detect the previous version: auto, from-tag, from-file or manual'
    required: false
    default: 'auto'
  version-next:
    description: 'The strategy to calculate the next version: auto, semantic, from-file, increment or manual'
    required: false
    default: 'auto'
  version-output-format:
    description: 'The output format of the next version'
    required: false
    default: '{{.Major}}.{{.Minor}}.{{.Patch}}'
  version-tag:
    description: 'If enabled, a new tag will be created'
    required: false
    default: 'false'
  version-tag-prefix:
    description: 'The prefix for the new tag - prefixed before the output'
    required: false
    default: 'v'
outputs:
  version:
    description: 'The next version (using semantic versioning)'
    value: ${{ steps.release_version.outputs.version }}
  previous-version:
    description: 'The previous version'
    value: ${{ steps.release_version.outputs.previous-version }}
runs:
  using: "composite"
  steps:
    - name: Resolve previous-version strategy
      id: resolve_previous_version
      shell: bash
      run: |
        set -euo pipefail
        PREVIOUS="${{ inputs.version-previous }}"
        if [[ "${PREVIOUS}" == "auto" && "${{ github.event_name }}" != "pull_request" ]]; then
          BRANCH="${{ github.ref_name }}"
          if [[ "${BRANCH}" =~ ^release-v?([0-9]+(\.[0-9]+)?)$ ]]; then
            BRANCH_VERSION="${BASH_REMATCH[1]}"
            PREVIOUS="from-tag:${{ inputs.version-tag-prefix }}${BRANCH_VERSION}"
          fi
        fi
        echo "previous-version=${PREVIOUS}" >> "$GITHUB_OUTPUT"

    - name: Next release version
      id: release_version
      uses: getdevopspro/jx-release-version@dev
      with:
        previous-version: ${{ steps.resolve_previous_version.outputs.previous-version }}
        next-version: ${{ inputs.version-next }}
        output-format: ${{ inputs.version-output-format }}
        tag: ${{ inputs.version-tag }}
        tag-prefix: ${{ inputs.version-tag-prefix }}
