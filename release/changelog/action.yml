name: Release Changelog
description: 'Generate a release changelog using git-cliff and stage the output file'
inputs:
  version:
    description: 'The release version to tag the changelog with'
    required: true
  previous-version:
    description: 'The previous version to generate the changelog from'
    required: true
  token:
    description: 'GitHub token for changelog generation (defaults to current GitHub token)'
    required: false
    default: ''
  output:
    description: 'Output file path for the generated changelog'
    required: false
    default: 'CHANGELOG.md'
  config:
    description: 'Path to the cliff.toml config file passed to git-cliff'
    required: false
    default: ''
  args:
    description: 'Additional arguments to pass to git-cliff'
    required: false
    default: ''
  prepend:
    description: 'Prepend the generated changelog to the output file instead of overwriting it'
    required: false
    default: 'true'
  summary:
    description: 'Append the generated changelog to the GitHub step summary'
    required: false
    default: 'true'
  artifact:
    description: 'Upload the generated changelog as a workflow artifact'
    required: false
    default: 'true'
  artifact-name:
    description: 'Name of the changelog artifact'
    required: false
    default: 'release-changelog'
  git-cliff-version:
    description: 'git-cliff version to install (defaults to latest)'
    required: false
    default: 'latest'
  use-emojis:
    description: 'Include emojis in changelog group headers'
    required: false
    default: 'false'
  version-prefix:
    description: 'Prefix to trim from version tags when generating changelog (e.g. "v")'
    required: false
    default: 'v'
outputs:
  content:
    description: 'The generated changelog content'
    value: ${{ steps.git_cliff.outputs.content }}
runs:
  using: "composite"
  steps:
    - name: generate release changelog
      id: git_cliff
      shell: bash
      env:
        ARTIFACT: ${{ inputs.artifact }}
        CHANGELOG_ARTIFACT_DIR: ${{ runner.temp }}/cliff-changelog-artifact
        CHANGELOG_OUTPUT: ${{ inputs.output }}
        CONFIG: ${{ inputs.config || format('{0}/cliff.toml', github.action_path) }}
        GIT_CLIFF_ARGS: ${{ inputs.args }}
        GIT_CLIFF_VERSION: ${{ inputs.git-cliff-version }}
        CLIFF_USE_EMOJIS: ${{ inputs.use-emojis }}
        CLIFF_VERSION_PREFIX: ${{ inputs.version-prefix }}
        GITHUB_REPO: ${{ github.repository }}
        GITHUB_TOKEN: ${{ inputs.token || github.token }}
        PREPEND: ${{ inputs.prepend }}
        PREVIOUS_VERSION: ${{ inputs.previous-version }}
        RUNNER_TEMP: ${{ runner.temp }}
        SUMMARY: ${{ inputs.summary }}
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        echo "Installing git-cliff..."
        install_dir="${RUNNER_TEMP}/git-cliff/bin"
        mkdir -p "${install_dir}"
        echo "${install_dir}" >> "${GITHUB_PATH}"
        export PATH="${install_dir}:${PATH}"

        download_dir="${RUNNER_TEMP}/git-cliff/download"
        rm -rf "${download_dir}"
        mkdir -p "${download_dir}"

        target="$(uname -m | sed 's/^arm64$/aarch64/')-$([ "$(uname -s)" = Darwin ] && echo apple-darwin || echo unknown-linux-gnu)"

        tag_args=()
        if [ "${GIT_CLIFF_VERSION}" != "latest" ]; then
          tag_args=("v${GIT_CLIFF_VERSION#v}")
        fi

        GH_TOKEN="${GITHUB_TOKEN}" gh release download "${tag_args[@]}" \
          --repo orhun/git-cliff \
          --pattern "git-cliff-*-${target}.tar.gz" \
          --dir "${download_dir}" \
          --clobber

        tar -xzf "${download_dir}"/git-cliff-*-"${target}".tar.gz -C "${download_dir}"
        install -m 0755 "${download_dir}"/git-cliff-*/git-cliff "${install_dir}/git-cliff"

        git-cliff --version

        echo "Setting up git-cliff context..."
        output="${CHANGELOG_OUTPUT}"
        if [ "${PREPEND}" = "true" ]; then
          output="${RUNNER_TEMP}/cliff/changelog/${CHANGELOG_OUTPUT}"
          mkdir -p "$(dirname "${output}")"
          [ -f "${output}" ] || touch "${output}"
        fi

        range="${PREVIOUS_VERSION}..${VERSION}"
        prepend_args=()
        if [ "${PREPEND}" = "true" ]; then
          range="${PREVIOUS_VERSION}..HEAD"
          prepend_args=(--prepend "${CHANGELOG_OUTPUT}")
        fi

        echo "Generating changelog for range ${range} with git-cliff..."
        # shellcheck disable=SC2086
        git-cliff \
          --config "${CONFIG}" \
          --tag "${VERSION}" \
          --output "${output}" \
          "${prepend_args[@]}" \
          ${GIT_CLIFF_ARGS} \
          "${range}"
        git add "${CHANGELOG_OUTPUT}"

        echo "Storing generated changelog content in output variable..."
        {
          delimiter="git_cliff_content_${RANDOM}_${RANDOM}"
          echo "content<<${delimiter}"
          cat "${output}"
          echo "${delimiter}"
        } >> "${GITHUB_OUTPUT}"

        echo "Saving generated changelog to step summary..."
        if [ "${SUMMARY}" = "true" ]; then
          {
            echo "# Release changelog"
            echo
            cat "${output}"
          } >> "${GITHUB_STEP_SUMMARY}"
        fi

        echo "Saving generated changelog as artifact..."
        if [ "${ARTIFACT}" = "true" ]; then
          rm -rf "${CHANGELOG_ARTIFACT_DIR}"
          mkdir -p "${CHANGELOG_ARTIFACT_DIR}"
          cp "${output}" "${CHANGELOG_ARTIFACT_DIR}/CHANGELOG.md"
        fi

    - name: upload changelog artifact
      if: inputs.artifact == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ runner.temp }}/cliff-changelog-artifact/*
        if-no-files-found: error
